spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mini_db
    username: saas_user
    password: saas_pass
  jpa:
    hibernate:
      ddl-auto: validate # CRITICAL: Forces Hibernate to leave the schema alone
    show-sql: true # Great for debugging and seeing your tenant filters in action
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration