<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Invoice</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; color: #333; }
        .invoice-box { max-width: 800px; margin: auto; padding: 30px; border: 1px solid #eee; }
        .header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; }
        .total { font-weight: bold; font-size: 18px; text-align: right; margin-top: 20px; }
    </style>
</head>
<body>
<div class="invoice-box">
    <div class="header">
        <h1>INVOICE #<span th:text="${invoice.id}"></span></h1>
    </div>

    <p><strong>Issue Date:</strong> <span th:text="${invoice.issueDate}"></span></p>
    <p><strong>Customer ID:</strong> <span th:text="${invoice.customerId}"></span></p>
    <p><strong>Status:</strong> <span th:text="${invoice.status}"></span></p>

    <table>
        <thead>
        <tr>
            <th>Product ID</th>
            <th>Qty</th>
            <th>Total</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${invoice.lineItems}">
            <td th:text="${item.productId}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${'$' + item.subtotal}"></td>
        </tr>
        </tbody>
    </table>

    <div class="total">
        Total Amount: <span th:text="${'$' + invoice.totalAmount}"></span>
    </div>
</div>
</body>
</html>
